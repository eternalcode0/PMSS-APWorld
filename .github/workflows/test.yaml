name: Test APWorld
on: [push, pull_request]
jobs:
    tests:
        runs-on: ubuntu-latest
        steps:
            - uses: Eijebong/ap-actions/ap-tests@main
              with:
                  apworld-path: paper_mario_sticker_star
                  ap-version: "0.6.7-rc1" # Can also be "latest" to always get the latest, stable release of AP.
                  python-version: "3.11"
    fuzz:
        runs-on: ubuntu-latest
        steps:
            - uses: Eijebong/ap-actions/fuzz@main
              with:
                  apworld-path: paper_mario_sticker_star
                  ap-version: "0.6.7-rc1" # Can also be "latest" to always get the latest, stable release of AP.
                  python-version: "3.11"
                  runs: 500 # This is optional
                  yamls-per-run: 1 # This is optional
                  dump-ignored: false # This is optional
